apiVersion: skaffold/v4beta4
kind: Config
metadata:
  name: api-platform
build:
  artifacts:
    - image: api-platform-php
      context: ..
      docker:
        dockerfile: api/Dockerfile
        target: frankenphp_dev
      sync:
        infer:
          - api/**/*.php
          - api/config/**/*.yaml
          - api/config/**/*.php
          - api/frankenphp/**/*.ini
          - api/frankenphp/Caddyfile
          - bundles/**/*.php
          - bundles/**/composer.json
deploy:
  helm:
    releases:
    - name: api-platform
      chartPath: ./api-platform
      namespace: default
      setValueTemplates:
        php.image.repository: "{{.IMAGE_REPO_api_platform_php}}"
        php.image.tag: "{{.IMAGE_TAG_api_platform_php}}@{{.IMAGE_DIGEST_api_platform_php}}"
      valuesFiles:
        - skaffold-values.yaml
